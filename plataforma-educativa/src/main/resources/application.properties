spring.application.name=plataforma-educativa

##Configuration with Security
spring.security.user.name=${SS_USERNAME}
spring.security.user.password=${SS_PASSWORD}

##Configuration with BD
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${BD_URL}
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}

##Configuration de JWT
security.jwt.private.key=${PRIVATE_KEY}
security.jwt.user.generator=${USER_GENERATOR}
